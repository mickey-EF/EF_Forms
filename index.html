<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EF Form testing</title>

    <!-- Loading EF script in head -->
    <script
      type="text/javascript"
      src="https://www.clik2trk.com/scripts/main.js"
    ></script>
  </head>
  <body>
    <h2>Test Form</h2>
    <form action="">
      <label for="firstname"></label>
      <input
        type="text"
        name="firstname"
        id="firstname"
        placeholder="First Name"
      />
      <label for="lastname"></label>
      <input
        type="text"
        name="lastname"
        id="lastname"
        placeholder="Last Name"
      />
      <label for="email"></label>
      <input type="text" name="email" id="email" placeholder="Email" />
      <label for="phone"></label>
      <input type="text" name="phone" id="phone" placeholder="Phone" />

      <!-- Add this hidden field inside your form -->
      <input type="hidden" id="ef_tid" name="ef_transaction_id" value="" />

      <button type="submit">Submit</button>
    </form>

    <!-- On page load, grab the Transaction ID from URL -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const transactionId = urlParams.get("_ef_transaction_id");

        if (transactionId) {
          document.getElementById("ef_tid").value = transactionId;
          console.log("Extracted TID from URL. TID:" + transactionId);
        }
      });
    </script>
  </body>
</html>
